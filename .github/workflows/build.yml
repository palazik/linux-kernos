name: Build & Release KernOS Kernel

on:
  push:
    branches: [main]
    paths:
      - 'PKGBUILD'
      - 'patches/**'
      - 'generate-config.sh'
  workflow_dispatch:
    inputs:
      kernel_version:
        description: 'Override kernel version (e.g. 6.14.5). Leave empty to auto-detect.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update keyring and system
        run: |
          pacman -Sy --needed --noconfirm archlinux-keyring
          pacman -Syu --noconfirm

      - name: Install build dependencies
        run: |
          pacman -S --needed --noconfirm \
            base-devel bc cpio gettext libelf pahole perl python \
            rsync tar xz clang llvm lld ccache git zstd curl

      - name: Setup ccache
        run: |
          mkdir -p /ccache
          ccache --max-size=5G
          ccache --set-config=compiler_check=content
          echo "CCACHE_DIR=/ccache" >> $GITHUB_ENV
          echo "PATH=/usr/lib/ccache/bin:$PATH" >> $GITHUB_ENV

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: /ccache
          key: ccache-kernel-${{ runner.os }}-${{ hashFiles('PKGBUILD') }}-${{ github.run_id }}
          restore-keys: |
            ccache-kernel-${{ runner.os }}-${{ hashFiles('PKGBUILD') }}-
            ccache-kernel-${{ runner.os }}-

      - name: Setup build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builder:builder .
          chown -R builder:builder /ccache

      - name: Build kernel packages
        env:
          KERNOS_KERNEL_VERSION: ${{ github.event.inputs.kernel_version }}
        run: |
          sudo -u builder bash -c "
            export CCACHE_DIR=/ccache
            export PATH=/usr/lib/ccache/bin:\$PATH
            export KBUILD_BUILD_TIMESTAMP=''
            export KBUILD_BUILD_USER=builder
            export KBUILD_BUILD_HOST=linux-kernos
            export KERNOS_KERNEL_VERSION='${KERNOS_KERNEL_VERSION}'
            makepkg -s --noconfirm --skippgpcheck 2>&1
          "

      - name: Show ccache stats
        run: ccache --show-stats

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /ccache
          key: ccache-kernel-${{ runner.os }}-${{ hashFiles('PKGBUILD') }}-${{ github.run_id }}

      - name: Build pacman repo database
        if: github.ref == 'refs/heads/main'
        run: |
          repo-add kernos.db.tar.gz linux-*.pkg.tar.zst
          ln -sf kernos.db.tar.gz kernos.db
          ln -sf kernos.files.tar.gz kernos.files

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kernel
          name: KernOS Kernel (latest)
          body: "Built from CachyOS sources with KernOS patches."
          files: |
            linux-*.pkg.tar.zst
            kernos.db.tar.gz
            kernos.db
            kernos.files.tar.gz
            kernos.files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (non-main)
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-pr-${{ github.run_number }}
          path: linux-*.pkg.tar.zst
          retention-days: 14
